<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 100px;
  border-radius: 50%;
  margin-bottom: 10px;
}

button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 6px;
}

.result {
  margin-top: 20px;
  display: none;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
  white-space: pre-line;
  border-radius: 8px;
}

#paymentBox {
  display: none;
  margin-top: 20px;
}

input {
  padding: 10px;
  width: 70%;
  margin-top: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Haneul Palette Logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- GOOGLE FORM BUTTON -->
<a href="https://forms.gle/X5q31CnBjPVBvDjs9" target="_blank">
  <button>Start Analysis (Fill Form)</button>
</a>

<br>

<!-- PREVIEW BUTTON -->
<button onclick="showPreview()">View Preview Report</button>

<!-- PREVIEW BOX -->
<div class="result" id="previewBox"></div>

<!-- PAYMENT SECTION -->
<div id="paymentBox">
  <h3>💳 Unlock Full Report – ₹499</h3>
  <p>Scan UPI QR and complete payment</p>

  <!-- UPI QR IMAGE -->
  <img src="upi.png" width="200" alt="UPI QR Code">

  <br>

  <input type="text" id="txn" placeholder="Enter UPI Transaction ID / PNR">
  <br>
  <button onclick="verifyPayment()">Submit Payment</button>
</div>

<!-- DOWNLOAD BUTTON -->
<button id="downloadBtn" style="display:none;" onclick="downloadPDF()">
Download Full Report (PDF)
</button>

</div>

<script>

let fullReport = "";

function showPreview(){

  // PREVIEW CONTENT (MORE REALISTIC)
  const previewText = `
PREVIEW REPORT

Season: Soft Autumn
Undertone: Warm

Sample Suitable Colors:
• Olive Green
• Warm Beige
• Soft Brown

(Full report includes complete personalized palette, styling guidance, and detailed analysis)
`;

  document.getElementById("previewBox").innerText = previewText;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("paymentBox").style.display = "block";

  // FULL REPORT (LOCKED)
  fullReport = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Soft Autumn
Undertone: Warm

Core Colors:
- Olive Green
- Beige
- Warm Brown
- Rust
- Soft Gold
- Camel

Avoid:
- Neon shades
- Cool blue tones

Style Direction:
Warm, muted tones enhance your natural harmony and create a balanced appearance.

Wardrobe Guidance:
Focus on earthy tones and soft contrasts for a refined everyday look.

Thank you for choosing Haneul Palette.
`;
}

  // PREVIEW CONTENT
  const previewText = `
PREVIEW REPORT

Your analysis is ready.

Season: Identified
Undertone: Identified

(Full report includes detailed personalized colors and styling guidance)
`;

  document.getElementById("previewBox").innerText = previewText;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("paymentBox").style.display = "block";

  // FULL REPORT (LOCKED UNTIL PAYMENT)
  fullReport = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

This report provides a refined understanding of your personal color direction.

✔ Undertone Analysis
✔ Seasonal Classification
✔ Personalized Color Palette
✔ Clothing Color Guidance
✔ Style Direction

Your natural tones align best with harmonious and balanced color combinations that enhance your overall appearance.

Thank you for choosing Haneul Palette.
`;
}

function verifyPayment(){

  const txn = document.getElementById("txn").value;

  if(txn.length < 5){
    alert("Please enter a valid Transaction ID");
    return;
  }

  alert("Payment recorded. Full report unlocked.");

  document.getElementById("downloadBtn").style.display = "inline-block";
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function(){

    // LOGO
    doc.addImage(img, "PNG", 85, 10, 40, 40);

    // TITLE
    doc.setFontSize(14);
    doc.text("Core Color Clarity Report", 50, 60);

    // CONTENT
    doc.setFontSize(11);
    const lines = doc.splitTextToSize(fullReport, 180);
    doc.text(lines, 10, 75);

    // DOWNLOAD PDF
    doc.save("Core_Color_Clarity_Report.pdf");
  }
}

</script>

</body>
</html>
