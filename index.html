<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 100px;
  border-radius: 50%;
}

button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 6px;
}

.result {
  display: none;
  margin-top: 20px;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
  white-space: pre-line;
  border-radius: 8px;
}

#paymentSection {
  display: none;
  margin-top: 20px;
}

#unlockSection {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- STEP 1 -->
<h3>Upload Your Photo</h3>
<input type="file" id="imageInput" accept="image/*">

<br>
<button onclick="generatePreview()">Get Preview</button>

<!-- STEP 2 -->
<div class="result" id="previewBox"></div>

<!-- STEP 3 -->
<div id="paymentSection">
  <h3>Unlock Full Report – ₹499</h3>
  <p>Scan QR code and complete payment</p>

  <!-- QR IMAGE -->
  <img src="upi.png" width="200">

  <p>After payment, submit proof using the form</p>

  <a href="https://forms.gle/9V3iHhhGr1PL6VT1A" target="_blank">
    <button>Submit Payment Proof</button>
  </a>

  <br>

  <button onclick="showUnlock()">I Have Submitted the Form</button>
</div>

<!-- STEP 4 -->
<div id="unlockSection">
  <h3>Download Your Report</h3>
  <button onclick="downloadPDF()">Download Full Report (PDF)</button>
</div>

</div>

<script>

let fullReport = "";

function generatePreview(){

  const file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("Please upload your image first");
    return;
  }

  // 🔥 PREMIUM PREVIEW (3 FEATURES)
  const preview = `
PREVIEW RESULT

Season Classification: Soft Autumn
Undertone Profile: Warm-Neutral

Dominant Color Harmony:
Muted earthy tones enhance your natural features and create a balanced, refined appearance.

(Full report includes complete palette, contrast level, styling and wardrobe guidance)
`;

  document.getElementById("previewBox").innerText = preview;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("paymentSection").style.display = "block";

  // FULL REPORT DATA
  fullReport = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Soft Autumn
Undertone: Warm-Neutral

Best Colors:
Olive, Beige, Rust, Camel, Soft Gold

Avoid:
Cool tones, Neon shades

Style Direction:
Soft warm tones enhance your natural harmony and elegance.

Wardrobe Tips:
Focus on earthy palettes and low contrast styling for best results.

Thank you for choosing Haneul Palette.
`;
}

function showUnlock(){
  alert("Once your payment is verified, your report is ready.");
  document.getElementById("unlockSection").style.display = "block";
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function(){

    doc.addImage(img, "PNG", 85, 10, 40, 40);

    doc.setFontSize(14);
    doc.text("Core Color Clarity Report", 50, 60);

    doc.setFontSize(11);
    const lines = doc.splitTextToSize(fullReport, 180);
    doc.text(lines, 10, 75);

    doc.save("Core_Color_Clarity_Report.pdf");
  }
}

</script>

</body>
</html>
