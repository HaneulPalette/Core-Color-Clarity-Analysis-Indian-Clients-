<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core Color Clarity</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.logo {
  width: 100px;
  border-radius: 50%;
}

input[type="file"] {
  margin-top: 15px;
}

button {
  padding: 12px 20px;
  background: black;
  color: white;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 6px;
}

.result {
  display: none;
  margin-top: 20px;
  background: #f5f5f5;
  padding: 15px;
  text-align: left;
  white-space: pre-line;
}

#paymentSection {
  display: none;
  margin-top: 20px;
}

#finalStep {
  display: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>🌿 Core Color Clarity</h1>
<p>A refined understanding of your natural color direction.</p>

<!-- STEP 1: IMAGE UPLOAD -->
<h3>Upload Your Photo</h3>
<input type="file" id="imageInput" accept="image/*">

<br>
<button onclick="generatePreview()">Get Preview</button>

<!-- STEP 2: PREVIEW -->
<div class="result" id="previewBox"></div>

<!-- STEP 3: PAYMENT -->
<div id="paymentSection">
  <h3>Unlock Full Report – ₹499</h3>
  <p>Scan the QR code and complete payment</p>

  <img src="upi.png" width="200">

  <p style="margin-top:10px;">
  After payment, submit proof using the form below
  </p>

  <a href="https://forms.gle/X5q31CnBjPVBvDjs9" target="_blank">
    <button>Submit Payment Proof</button>
  </a>
</div>

<!-- STEP 4: FINAL -->
<div id="finalStep">
  <p>Your full report will be shared after verification.</p>

  <button onclick="downloadPDF()">Download Sample Report</button>
</div>

</div>

<script>

let fullReport = "";

function generatePreview(){

  const file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("Please upload your image first");
    return;
  }

  // PREVIEW (2 FEATURES)
  const preview = `
PREVIEW RESULT

Season: Soft Autumn
Undertone: Warm

(Complete analysis available in full report)
`;

  document.getElementById("previewBox").innerText = preview;
  document.getElementById("previewBox").style.display = "block";

  document.getElementById("paymentSection").style.display = "block";

  // FULL REPORT (YOU WILL ACTUALLY SEND MANUALLY)
  fullReport = `
HANEUL PALETTE

CORE COLOR CLARITY REPORT

Season: Soft Autumn
Undertone: Warm

Recommended Colors:
Olive, Beige, Rust, Camel

Style Guidance:
Warm muted tones enhance your natural features.
`;
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = new Image();
  img.src = "logo.png";

  img.onload = function(){
    doc.addImage(img, "PNG", 85, 10, 40, 40);
    doc.text("Sample Report", 70, 60);

    const lines = doc.splitTextToSize(fullReport, 180);
    doc.text(lines, 10, 80);

    doc.save("Sample_Report.pdf");
  }
}

</script>

</body>
</html>
